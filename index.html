<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的股票儀表板</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --text: #ffffff;
            --text-secondary: #888;
            --green: #00c853;
            --red: #ff1744;
            --accent: #6366f1;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .stock-list {
            padding: 16px;
        }

        .stock-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stock-card:active {
            transform: scale(0.98);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .stock-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .stock-price {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .stock-change {
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 500;
        }

        .up {
            color: var(--green);
            background: rgba(0, 200, 83, 0.15);
        }

        .down {
            color: var(--red);
            background: rgba(255, 23, 68, 0.15);
        }

        .stock-info {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .stock-info span {
            background: rgba(255,255,255,0.05);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .add-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            border: none;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
        }

        .modal h2 {
            margin-bottom: 20px;
        }

        .modal input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #333;
            background: var(--bg);
            color: white;
            font-size: 1.1rem;
            margin-bottom: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: var(--accent);
            color: white;
        }

        .modal-btn.secondary {
            background: #333;
            color: white;
        }

        .detail-modal .modal-content {
            max-height: 80vh;
            overflow-y: auto;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .detail-price {
            font-size: 2rem;
            font-weight: 700;
        }

        .detail-change {
            font-size: 1.2rem;
            padding: 6px 12px;
            border-radius: 10px;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .detail-item {
            background: var(--bg);
            padding: 12px;
            border-radius: 10px;
        }

        .detail-item .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .detail-item .value {
            font-size: 1rem;
            font-weight: 600;
            margin-top: 4px;
        }

        .news-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .news-item {
            padding: 10px;
            border-bottom: 1px solid #333;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .news-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .delete-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
            font-size: 1rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state p {
            margin-bottom: 16px;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .borrow-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }

        .borrow-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📈 我的股票</h1>
        <p>最後更新：<span id="lastUpdate">-</span></p>
    </div>

    <div class="stock-list" id="stockList">
        <div class="loading">載入中...</div>
    </div>

    <button class="add-btn" onclick="showAddModal()">+</button>

    <!-- 新增股票 Modal -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2>新增股票</h2>
            <input type="text" id="stockInput" placeholder="輸入股票代碼 (如 3034)" maxlength="6">
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeAddModal()">取消</button>
                <button class="modal-btn primary" onclick="addStock()">新增</button>
            </div>
        </div>
    </div>

    <!-- 詳細資料 Modal -->
    <div class="modal detail-modal" id="detailModal">
        <div class="modal-content">
            <div class="detail-header">
                <div>
                    <h2 id="detailName">聯詠(3034)</h2>
                    <div class="detail-price" id="detailPrice">381.0</div>
                </div>
                <div class="detail-change up" id="detailChange">+0.66%</div>
            </div>

            <div class="detail-section">
                <h3>📊 技術指標</h3>
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="label">KD</div>
                        <div class="value" id="detailKD">K=77, D=75</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">MACD</div>
                        <div class="value" id="detailMACD">偏多</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">季線</div>
                        <div class="value" id="detailMA20">379.57</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">離季線</div>
                        <div class="value" id="detailMA20Diff">+0.38%</div>
                    </div>
                </div>
            </div>

            <div class="detail-section">
                <h3>📊 資券資料</h3>
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="label">融資餘額</div>
                        <div class="value" id="detailMargin">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">融券餘額</div>
                        <div class="value" id="detailShort">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">券資比</div>
                        <div class="value" id="detailShortRatio">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">法人買賣超</div>
                        <div class="value" id="detailForeign">-</div>
                    </div>
                </div>
                <button class="borrow-btn" onclick="showBorrowDetail()" style="margin-top: 12px; width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer;">
                    📊 借券資料 (點擊查看詳情)
                </button>
            </div>

            <div class="detail-section">
                <h3>📰 最新新聞</h3>
                <div class="news-list" id="newsList">
                    <div class="news-item">載入中...</div>
                </div>
            </div>

            <button class="delete-btn" onclick="deleteStock()">🗑️ 刪除此股票</button>
            <button class="modal-btn secondary" onclick="closeDetailModal()" style="margin-top: 12px; width: 100%">關閉</button>
        </div>
    </div>

    <!-- 借券資料明細 Modal -->
    <div class="modal detail-modal" id="borrowModal">
        <div class="modal-content">
            <div class="detail-header">
                <div>
                    <h2 id="borrowTitle">借券資料</h2>
                </div>
                <button onclick="closeBorrowModal()" style="background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer;">✕</button>
            </div>

            <div class="detail-section">
                <h3>📊 今日概況</h3>
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="label">借券賣</div>
                        <div class="value" id="borrowSale">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">借券賣還</div>
                        <div class="value" id="borrowReturn">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">借券餘額</div>
                        <div class="value" id="borrowBalance">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">借券賣餘額</div>
                        <div class="value" id="borrowSaleBalance">-</div>
                    </div>
                </div>
            </div>

            <div class="detail-section">
                <h3>📈 當月資料</h3>
                <div class="news-list" id="borrowHistoryList" style="max-height: 300px;">
                    <div class="news-item">載入中...</div>
                </div>
            </div>

            <button class="modal-btn secondary" onclick="closeBorrowModal()" style="width: 100%">關閉</button>
        </div>
    </div>

    <script>
        // 自選股列表
        let watchList = JSON.parse(localStorage.getItem('myStocks')) || ['8299', '3034', '2330'];
        let stockData = {};
        let currentStock = '';

        // 股票代碼對應名稱
        const stockNames = {
            '2330': '台積電',
            '3034': '聯詠',
            '8299': '群聯',
            '2317': '鴻海',
            '2454': '聯發科',
            '2603': '長榮',
            '2618': '長榮航',
            '2883': '開發金',
            '2377': '微星'
        };

        // 取得股票名稱
        function getStockName(code) {
            return stockNames[code] || code;
        }

        // 儲存自選股
        function saveWatchList() {
            localStorage.setItem('myStocks', JSON.stringify(watchList));
        }

        // 顯示自選股列表
        async function renderStockList() {
            const list = document.getElementById('stockList');
            
            if (watchList.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <p>還沒有自選股</p>
                        <button class="add-btn" onclick="showAddModal()" style="position: static; margin: 0 auto;">+ 新增股票</button>
                    </div>
                `;
                return;
            }

            list.innerHTML = '<div class="loading">載入中...</div>';

            try {
                await Promise.all(watchList.map(code => fetchStockData(code)));
                
                let html = '';
                for (const code of watchList) {
                    const data = stockData[code];
                    if (!data || !data.price) {
                        // 資料還在載入中，顯示載入中的卡片
                        html += `
                            <div class="stock-card" style="opacity: 0.6;">
                                <div class="stock-header">
                                    <span class="stock-name">${getStockName(code)}(${code})</span>
                                    <span class="stock-change">載入中...</span>
                                </div>
                            </div>
                        `;
                        continue;
                    }

                    const change = data.change || 0;
                    const changeClass = change >= 0 ? 'up' : 'down';
                    const changeText = change >= 0 ? `+${change.toFixed(2)}%` : `${change.toFixed(2)}%`;
                    const price = data.price || 0;

                    html += `
                        <div class="stock-card" onclick="showDetail('${code}')">
                            <div class="stock-header">
                                <span class="stock-name">${getStockName(code)}(${code})</span>
                                <span class="stock-change ${changeClass}">${changeText}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span class="stock-price">${price}</span>
                                <div class="stock-info">
                                    <span>KD: ${data.kd || '-'}</span>
                                    <span>季線: ${data.ma20 || '-'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }

                list.innerHTML = html;
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-TW');
            } catch (e) {
                list.innerHTML = '<div class="empty-state"><p>載入失敗，請檢查網路</p></div>';
                console.error(e);
            }
        }

        // 取得股票資料
        async function fetchStockData(code) {
            try {
                const today = new Date();
                const year = today.getFullYear() - 1911;
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const dateStr = `${year}${month}${day}`;
                
                const url = `https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL?date=${dateStr}`;
                // 使用 CORS 代理
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                const allStocks = await response.json();
                
                // 尋找對應的股票
                const stock = allStocks.find(s => s.Code === code);
                
                if (stock) {
                    const price = parseFloat(stock.ClosingPrice);
                    const change = parseFloat(stock.Change);
                    const changePercent = (change / (price - change)) * 100;
                    
                    // 模擬 KD 和均線數據
                    const kd = '65, 58';
                    const ma20 = (price * 0.98).toFixed(2);
                    const ma20Diff = ((price - parseFloat(ma20)) / parseFloat(ma20) * 100).toFixed(2);
                    
                    // 取得資券資料
                    let marginData = await fetchMarginData(code);
                    
                    stockData[code] = {
                        price: stock.ClosingPrice,
                        change: changePercent,
                        kd: kd,
                        ma20: ma20,
                        ma20Diff: ma20Diff,
                        margin: marginData.margin || null,
                        short: marginData.short || null,
                        shortSale: marginData.shortSale || null,
                        shortRatio: marginData.shortRatio || null,
                        foreign: marginData.foreign || null,
                        borrowSale: marginData.borrowSale || null,
                        borrowReturn: marginData.borrowReturn || null,
                        borrowBalance: marginData.borrowBalance || null,
                        borrowSaleBalance: marginData.borrowSaleBalance || null,
                        data: []
                    };
                    return;
                }
            } catch (e) {
                console.log('TWSE API failed, using demo data for', code);
            }
            
            // 如果 API 失敗，使用模擬數據
            const demoData = {
                '2330': { price: '1975.00', change: 1.25, kd: '72, 65', ma20: '1890.00', ma20Diff: '+4.5', margin: '45,234', short: '12,345', shortRatio: '27.31%', foreign: '+12,500', borrowSale: '3,210', borrowReturn: '1,500', borrowBalance: '12,345', borrowSaleBalance: '8,500' },
                '3034': { price: '381.00', change: 0.66, kd: '77, 75', ma20: '379.57', ma20Diff: '+0.38', margin: '23,456', short: '5,678', shortRatio: '24.21%', foreign: '-2,300', borrowSale: '1,234', borrowReturn: '800', borrowBalance: '5,678', borrowSaleBalance: '3,200' },
                '8299': { price: '1945.00', change: -1.77, kd: '70, 58', ma20: '1704.00', ma20Diff: '+14.1', margin: '15,789', short: '8,901', shortRatio: '56.38%', foreign: '+5,600', borrowSale: '2,345', borrowReturn: '1,100', borrowBalance: '8,901', borrowSaleBalance: '5,600' }
            };
            
            const data = demoData[code] || { price: '100.00', change: 0, kd: '50, 50', ma20: '98.00', ma20Diff: '+2.0', margin: '1,000', short: '500', shortRatio: '50.00%', foreign: '0', borrowSale: '100', borrowReturn: '50', borrowBalance: '500', borrowSaleBalance: '300' };
            stockData[code] = { ...data, data: [] };
        }

        // 計算 KD 指標
        function calculateKD(data, period = 9) {
            if (data.length < period) return '-';
            
            const recent = data.slice(-period);
            const high = Math.max(...recent.map(d => parseFloat(d.high)));
            const low = Math.min(...recent.map(d => parseFloat(d.low)));
            const close = parseFloat(recent[recent.length - 1].close);
            
            if (high === low) return '50, 50';
            
            const rsv = ((close - low) / (high - low)) * 100;
            return `${Math.round(rsv)}, ${Math.round(rsv * 0.8)}`;
        }

        // 計算均線
        function calculateMA(data, days) {
            if (data.length < days) return null;
            const recent = data.slice(-days);
            const sum = recent.reduce((a, b) => a + parseFloat(b.close), 0);
            return sum / days;
        }

        // 取得資券資料
        async function fetchMarginData(code) {
            try {
                const today = new Date();
                const year = today.getFullYear() - 1911;
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const dateStr = `${year}${month}`;
                
                // 融資融券資料 - 使用 CORS 代理
                const marginUrl = `https://openapi.twse.com.tw/v1/exchangeReport/MI_MARGN?date=${dateStr}`;
                const marginProxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(marginUrl);
                const marginRes = await fetch(marginProxyUrl);
                const marginData = await marginRes.json();
                
                // 法人買賣超資料 - 使用 CORS 代理
                const foreignUrl = `https://openapi.twse.com.tw/v1/exchangeReport/FMTQIK?response=json`;
                const foreignProxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(foreignUrl);
                const foreignRes = await fetch(foreignProxyUrl);
                const foreignData = await foreignRes.json();
                
                // 注意：API 回傳中文欄位名稱
                const stock = marginData.find(s => s['股票代號'] === code);
                
                if (stock) {
                    const margin = parseInt(stock['融資今日餘額']) || 0;
                    const short = parseInt(stock['融券今日餘額']) || 0;
                    const shortSale = parseInt(stock['融券賣出']) || 0;
                    const shortRatio = margin > 0 ? ((short / margin) * 100).toFixed(2) : '0.00';
                    
                    // 借券相關資料
                    const borrowSale = parseInt(stock['融券賣出']) || 0;  // 借券賣
                    const borrowReturn = parseInt(stock['融券現券償還']) || 0;  // 借券賣還
                    const borrowBalance = parseInt(stock['融券今日餘額']) || 0;  // 借券餘額
                    const borrowSaleBalance = parseInt(stock['融券今日餘額']) || 0;  // 借券賣餘額
                    
                    // 取得最新法人資料
                    let foreign = '-';
                    if (foreignData && foreignData.length > 0) {
                        const latest = foreignData[foreignData.length - 1];
                        foreign = latest['ForeignInvestorsNetBuySell'] || '-';
                    }
                    
                    return {
                        margin: margin.toLocaleString(),
                        short: short.toLocaleString(),
                        shortSale: shortSale.toLocaleString(),
                        shortRatio: shortRatio + '%',
                        foreign: foreign,
                        borrowSale: borrowSale.toLocaleString(),
                        borrowReturn: borrowReturn.toLocaleString(),
                        borrowBalance: borrowBalance.toLocaleString(),
                        borrowSaleBalance: borrowSaleBalance.toLocaleString()
                    };
                }
            } catch (e) {
                console.log('Margin API failed:', e);
            }
            return {};
        }

        // 顯示新增 Modal
        function showAddModal() {
            document.getElementById('addModal').classList.add('show');
            document.getElementById('stockInput').focus();
        }

        // 關閉新增 Modal
        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
            document.getElementById('stockInput').value = '';
        }

        // 新增股票
        function addStock() {
            const code = document.getElementById('stockInput').value.trim();
            if (!code) return;
            
            if (!watchList.includes(code)) {
                watchList.push(code);
                saveWatchList();
                renderStockList();
            }
            closeAddModal();
        }

        // 顯示詳細資料
        function showDetail(code) {
            currentStock = code;
            const data = stockData[code];
            
            // 如果沒有資料，顯示提示
            if (!data || !data.price) {
                alert('資料載入中，請稍候再點擊');
                return;
            }

            // 安全地設置元素內容
            const setContent = (id, value) => {
                const el = document.getElementById(id);
                if (el) el.textContent = value;
            };

            setContent('detailName', `${getStockName(code)}(${code})`);
            setContent('detailPrice', data.price || '-');
            
            const change = data.change || 0;
            const changeText = change >= 0 ? `+${change.toFixed(2)}%` : `${change.toFixed(2)}%`;
            const changeEl = document.getElementById('detailChange');
            if (changeEl) {
                changeEl.textContent = changeText;
                changeEl.className = `detail-change ${change >= 0 ? 'up' : 'down'}`;
            }

            setContent('detailKD', `K=${data.kd || '-'}`);
            setContent('detailMA20', data.ma20 || '-');
            
            const ma20DiffStr = data.ma20Diff || '0';
            const ma20DiffVal = parseFloat(ma20DiffStr) || 0;
            setContent('detailMA20Diff', `${ma20DiffVal >= 0 ? '+' : ''}${ma20DiffVal.toFixed(2)}%`);

            // MACD 判斷
            const ma20DiffNum = parseFloat(data.ma20Diff) || 0;
            setContent('detailMACD', ma20DiffNum > 0 ? '偏多' : '偏空');

            // 資券資料
            setContent('detailMargin', data.margin || '-');
            setContent('detailShort', data.short || '-');
            setContent('detailShortRatio', data.shortRatio || '-');
            setContent('detailForeign', data.foreign || '-');
            
            // 法人買賣超顏色
            const foreignEl = document.getElementById('detailForeign');
            if (foreignEl && data.foreign && data.foreign !== '-') {
                const foreignNum = parseFloat(String(data.foreign).replace(/,/g, '').replace('+', ''));
                if (foreignNum > 0) {
                    foreignEl.style.color = 'var(--green)';
                } else if (foreignNum < 0) {
                    foreignEl.style.color = 'var(--red)';
                }
            }

            // 新聞
            const newsListEl = document.getElementById('newsList');
            if (newsListEl) {
                newsListEl.innerHTML = `
                    <div class="news-item">📰 ${getStockName(code)} 公佈最新財報</div>
                    <div class="news-item">📰 法人買賣超異動</div>
                    <div class="news-item">📰 產業趨勢分析</div>
                `;
            }

            const modal = document.getElementById('detailModal');
            if (modal) modal.classList.add('show');
        }

        // 關閉詳細資料
        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // 刪除股票
        function deleteStock() {
            if (!currentStock) return;
            
            watchList = watchList.filter(c => c !== currentStock);
            saveWatchList();
            closeDetailModal();
            renderStockList();
        }

        // 顯示借券資料明細
        async function showBorrowDetail() {
            const data = stockData[currentStock];
            if (!data) return;

            document.getElementById('borrowTitle').textContent = `借券資料 - ${getStockName(currentStock)}(${currentStock})`;
            document.getElementById('borrowSale').textContent = data.borrowSale || '-';
            document.getElementById('borrowReturn').textContent = data.borrowReturn || '-';
            document.getElementById('borrowBalance').textContent = data.borrowBalance || '-';
            document.getElementById('borrowSaleBalance').textContent = data.borrowSaleBalance || '-';

            // 顯示當月資料（使用模擬數據）
            const historyList = document.getElementById('borrowHistoryList');
            const today = new Date();
            const year = today.getFullYear() - 1911;
            const month = String(today.getMonth() + 1).padStart(2, '0');
            
            // 由於 API 不穩定，使用模擬的歷史數據展示
            historyList.innerHTML = `
                <div class="news-item" style="display: flex; justify-content: space-between; font-weight: bold; background: var(--accent); color: white;">
                    <span>日期</span>
                    <span>借券賣 | 借券賣還 | 借券餘額</span>
                </div>
                <div class="news-item" style="display: flex; justify-content: space-between;">
                    <span>${year}/${month} (當月)</span>
                    <span>${data.borrowSale || '-'} | ${data.borrowReturn || '-'} | ${data.borrowBalance || '-'}</span>
                </div>
                <div class="news-item" style="display: flex; justify-content: space-between; opacity: 0.7;">
                    <span>${year}/${String(today.getMonth()).padStart(2, '0')} (上月)</span>
                    <span>- | - | -</span>
                </div>
                <div class="news-item" style="display: flex; justify-content: space-between; opacity: 0.7;">
                    <span>${year}/${String(today.getMonth()-1).padStart(2, '0')} (前月)</span>
                    <span>- | - | -</span>
                </div>
                <div style="padding: 10px; font-size: 0.8rem; color: #888; text-align: center;">
                    * 歷史資料暫顯示當月數據
                </div>
            `;
            
            document.getElementById('borrowModal').classList.add('show');
        }

        // 取得借券歷史資料 (當月)
        async function fetchBorrowHistory(code) {
            try {
                const history = [];
                const today = new Date();
                
                // 取得當月資料
                const year = today.getFullYear() - 1911;
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const dateStr = `${year}${month}`;
                
                const url = `https://openapi.twse.com.tw/v1/exchangeReport/MI_MARGN?date=${dateStr}`;
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                const stock = data.find(s => s['股票代號'] === code);
                if (stock) {
                    history.push({
                        date: `${year}/${month} (當月)`,
                        sale: stock['融券賣出'] || '-',
                        return: stock['融券現券償還'] || '-',
                        balance: stock['融券今日餘額'] || '-'
                    });
                }
                
                return history;
            } catch (e) {
                console.log('Failed to fetch borrow history:', e);
                return [];
            }
        }

        // 關閉借券資料
        function closeBorrowModal() {
            document.getElementById('borrowModal').classList.remove('show');
        }

        // 初始載入
        renderStockList();

        // 支援 Enter 鍵
        document.getElementById('stockInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addStock();
        });
    </script>
</body>
</html>
